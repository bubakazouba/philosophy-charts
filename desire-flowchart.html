<script>
// ===================== READ STATE (localStorage) =====================
const STORAGE_KEY = 'desire_graph_read_state';

function getReadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveReadState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function isRead(nodeId) {
  return !!getReadState()[nodeId];
}
function toggleRead(nodeId) {
  const state = getReadState();
  if (state[nodeId]) { delete state[nodeId]; } else { state[nodeId] = true; }
  saveReadState(state);
  updateNodeVisuals(nodeId);
  updateProgress();
  // Update popup button if open
  const btn = document.getElementById('read-toggle-btn');
  if (btn && btn.dataset.nodeId === nodeId) {
    updateReadButton(nodeId);
  }
}
function markAllRead() {
  const state = getReadState();
  nodes.forEach(n => { state[n.id] = true; });
  saveReadState(state);
  nodes.forEach(n => updateNodeVisuals(n.id));
  updateProgress();
}
function markAllUnread() {
  saveReadState({});
  nodes.forEach(n => updateNodeVisuals(n.id));
  updateProgress();
}

// ===================== NODE DATA =====================
const nodes = [
  // ===== SECTION 1: THEORIES =====

  { source: 'wb', target: 'gbt', label: 'well-being needs desire theory' },
  { source: 'pbt', target: 'obj_pleas_wb', label: 'aligns with' },
];

// ===================== BUILD CYTOSCAPE =====================
const typeColors = {
  theory: '#3b82f6',
  premise: '#22c55e',
  objection: '#ef4444',
  response: '#a855f7',
  consequence: '#eab308',
};

const cyNodes = nodes.map(n => ({
  data: {
    id: n.id,
    label: n.label,
    nodeType: n.type,
    section: n.section,
    color: typeColors[n.type],
    isRead: isRead(n.id),
  }
}));

const cyEdges = edges.map((e, i) => ({
  data: {
    id: 'e' + i,
    source: e.source,
    target: e.target,
    label: e.label || '',
    etype: e.etype || 'support',
  }
}));

const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: [...cyNodes, ...cyEdges],
  style: [
    {
      selector: 'node',
      style: {
        'label': 'data(label)',
        'text-wrap': 'wrap',
        'text-max-width': '140px',
        'font-size': '10px',
        'color': '#e6edf3',
        'text-valign': 'center',
        'text-halign': 'center',
        'background-color': 'data(color)',
        'background-opacity': 0.6,
        'border-width': 2,
        'border-color': 'data(color)',
        'width': 'label',
        'height': 'label',
        'padding': '14px',
        'shape': 'round-rectangle',
        'text-outline-color': '#0d1117',
        'text-outline-width': 1,
        'min-width': '80px',
        'min-height': '40px',
        'transition-property': 'opacity, border-color, border-width, background-opacity',
        'transition-duration': '0.2s',
      }
    },
    {
      selector: 'node.read-node',
      style: {
        'background-opacity': 1,
        'border-width': 3,
        'border-color': '#22c55e',
        'border-style': 'solid',
      }
    },
    {
      selector: 'node.unread-node',
      style: {
        'background-opacity': 0.5,
        'border-style': 'dashed',
      }
    },
    {
      selector: 'node:active, node:selected',
      style: {
        'border-width': 3,
        'border-color': '#fff',
      }
    },
    {
      selector: 'edge',
      style: {
        'width': 1.5,
        'line-color': '#30363d',
        'target-arrow-color': '#30363d',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier',
        'arrow-scale': 0.8,
        'label': 'data(label)',
        'font-size': '8px',
        'color': '#6e7681',
        'text-rotation': 'autorotate',
        'text-outline-color': '#0d1117',
        'text-outline-width': 1,
        'transition-property': 'opacity, line-color',
        'transition-duration': '0.2s',
      }
    },
    {
      selector: 'edge[etype="attack"]',
      style: {
        'line-color': '#6e2a2a',
        'target-arrow-color': '#6e2a2a',
        'line-style': 'dashed',
      }
    },
    {
      selector: '.dimmed',
      style: { 'opacity': 0.12 }
    },
    {
      selector: '.highlighted',
      style: {
        'opacity': 1,
        'border-width': 3,
        'border-color': '#fff',
      }
    },
    {
      selector: 'edge.highlighted',
      style: {
        'opacity': 1,
        'width': 2.5,
        'line-color': '#58a6ff',
        'target-arrow-color': '#58a6ff',
      }
    },
    {
      selector: 'edge.highlighted[etype="attack"]',
      style: {
        'line-color': '#f85149',
        'target-arrow-color': '#f85149',
      }
    },
    {
      selector: '.search-match',
      style: {
        'border-width': 4,
        'border-color': '#ffd700',
        'z-index': 999,
      }
    },
    {
      selector: '.filter-hidden',
      style: { 'display': 'none' }
    }
  ],
  layout: {
    name: 'fcose',
    quality: 'proof',
    randomize: true,
    animate: false,
    nodeDimensionsIncludeLabels: true,
    idealEdgeLength: 160,
    nodeRepulsion: 12000,
    edgeElasticity: 0.1,
    gravity: 0.3,
    gravityRange: 2.0,
    numIter: 5000,
    padding: 60,
  },
  minZoom: 0.15,
  maxZoom: 3,
  wheelSensitivity: 0.3,
});

// ===================== READ/UNREAD VISUALS =====================
function updateNodeVisuals(nodeId) {
  const cyNode = cy.getElementById(nodeId);
  if (!cyNode.length) return;
  if (isRead(nodeId)) {
    cyNode.addClass('read-node').removeClass('unread-node');
    cyNode.data('isRead', true);
  } else {
    cyNode.addClass('unread-node').removeClass('read-node');
    cyNode.data('isRead', false);
  }
}

function updateReadButton(nodeId) {
  const btn = document.getElementById('read-toggle-btn');
  if (!btn) return;
  if (isRead(nodeId)) {
    btn.classList.add('is-read');
    btn.innerHTML = '&#10003; Read — click to mark unread';
  } else {
    btn.classList.remove('is-read');
    btn.innerHTML = 'Mark as read';
  }
}

function updateProgress() {
  const state = getReadState();
  const readCount = nodes.filter(n => state[n.id]).length;
  const total = nodes.length;
  const pct = total > 0 ? (readCount / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = readCount + ' / ' + total + ' read (' + Math.round(pct) + '%)';
}

// Initialize all node visuals
nodes.forEach(n => updateNodeVisuals(n.id));
updateProgress();

// ===================== POPUP =====================
const popup = document.getElementById('popup');
const popupContent = document.getElementById('popup-content');
let currentPopupNodeId = null;

function buildPopupHTML(nodeData) {
  const n = nodes.find(x => x.id === nodeData.id);
  if (!n) return '';
  const d = n.detail || {};
  const typeLabel = n.type.charAt(0).toUpperCase() + n.type.slice(1);
  const typeColor = typeColors[n.type];
  const read = isRead(n.id);

  let html = `<div class="popup-type" style="background:${typeColor}33;color:${typeColor};border:1px solid ${typeColor};">${typeLabel} — ${n.section}</div>`;
  html += `<div class="popup-title" style="color:${typeColor};">${n.title || n.label.replace(/\n/g, ' ')}</div>`;

  if (d.philosophers) html += `<div class="popup-section"><h4>Philosopher(s)</h4><p>${d.philosophers}</p></div>`;
  if (d.thesis) html += `<div class="popup-section"><h4>Core Claim</h4><p>${d.thesis}</p></div>`;
  if (d.premises && d.premises.length) {
    html += `<div class="popup-section"><h4>Premises / Support</h4><ul>${d.premises.map(p => `<li>${p}</li>`).join('')}</ul></div>`;
  }
  if (d.example) html += `<div class="popup-section"><h4>Example</h4><p>${d.example}</p></div>`;
  if (d.thought_experiment) html += `<div class="popup-section"><h4>Thought Experiment</h4><p>${d.thought_experiment}</p></div>`;
  if (d.consequence) html += `<div class="popup-section"><h4>Consequence</h4><p>${d.consequence}</p></div>`;
  if (d.advantage) html += `<div class="popup-section"><h4>Advantage</h4><p>${d.advantage}</p></div>`;
  if (d.limitation) html += `<div class="popup-section"><h4>Limitation</h4><p>${d.limitation}</p></div>`;
  if (d.dependency) html += `<div class="popup-section"><h4>Dependency</h4><p>${d.dependency}</p></div>`;
  if (d.counterargument) html += `<div class="popup-section"><h4>Counterargument</h4><p>${d.counterargument}</p></div>`;
  if (d.note) html += `<div class="popup-section"><h4>Note</h4><p>${d.note}</p></div>`;
  if (d.quote) html += `<div class="popup-section"><h4>Quote</h4><p style="font-style:italic;">${d.quote}</p></div>`;

  // Connections
  const incoming = edges.filter(e => e.target === n.id).map(e => {
    const src = nodes.find(x => x.id === e.source);
    return `<li><span style="color:${typeColors[src?.type]}">${src?.label.replace(/\n/g, ' ')}</span> &rarr; <em>${e.label}</em></li>`;
  });
  const outgoing = edges.filter(e => e.source === n.id).map(e => {
    const tgt = nodes.find(x => x.id === e.target);
    return `<li><em>${e.label}</em> &rarr; <span style="color:${typeColors[tgt?.type]}">${tgt?.label.replace(/\n/g, ' ')}</span></li>`;
  });
  if (incoming.length) html += `<div class="popup-section"><h4>Incoming Connections</h4><ul>${incoming.join('')}</ul></div>`;
  if (outgoing.length) html += `<div class="popup-section"><h4>Outgoing Connections</h4><ul>${outgoing.join('')}</ul></div>`;

  // Read toggle button
  const readClass = read ? 'is-read' : '';
  const readText = read ? '&#10003; Read — click to mark unread' : 'Mark as read';
  html += `<button class="read-toggle ${readClass}" id="read-toggle-btn" data-node-id="${n.id}" onclick="toggleRead('${n.id}')">${readText}</button>`;

  return html;
}

function showPopup(nodeData, position) {
  currentPopupNodeId = nodeData.id;
  popupContent.innerHTML = buildPopupHTML(nodeData);
  popup.style.display = 'block';

  const pw = popup.offsetWidth || 380;
  const ph = popup.offsetHeight || 300;
  let left = position.x + 20;
  let top = position.y - 20;
  if (left + pw > window.innerWidth - 20) left = position.x - pw - 20;
  if (top + ph > window.innerHeight - 20) top = window.innerHeight - ph - 20;
  if (top < 60) top = 60;
  if (left < 10) left = 10;

  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
}

function closePopup() {
  popup.style.display = 'none';
  currentPopupNodeId = null;
  cy.elements().removeClass('dimmed highlighted');
}

// ===================== INTERACTIONS =====================
cy.on('tap', 'node', function(evt) {
  const node = evt.target;
  const renderedPos = node.renderedPosition();

  cy.elements().addClass('dimmed');
  const neighborhood = node.neighborhood().add(node);
  neighborhood.removeClass('dimmed').addClass('highlighted');

  showPopup(node.data(), { x: renderedPos.x, y: renderedPos.y });
});

cy.on('tap', function(evt) {
  if (evt.target === cy) closePopup();
});

cy.on('mouseover', 'node', function(evt) {
  const node = evt.target;
  if (!currentPopupNodeId) {
    cy.elements().addClass('dimmed');
    node.neighborhood().add(node).removeClass('dimmed').addClass('highlighted');
  }
  document.getElementById('cy').style.cursor = 'pointer';
});

cy.on('mouseout', 'node', function(evt) {
  if (!currentPopupNodeId) {
    cy.elements().removeClass('dimmed highlighted');
  }
  document.getElementById('cy').style.cursor = 'default';
});

// ===================== FILTER BY TYPE =====================
let currentTypeFilter = 'all';
let currentReadFilter = 'all';

function applyFilters() {
  cy.nodes().forEach(n => {
    let show = true;
    if (currentTypeFilter !== 'all' && n.data('nodeType') !== currentTypeFilter) show = false;
    if (currentReadFilter === 'unread' && isRead(n.data('id'))) show = false;
    if (currentReadFilter === 'read' && !isRead(n.data('id'))) show = false;

    if (show) {
      n.removeClass('filter-hidden');
    } else {
      n.addClass('filter-hidden');
    }
  });
  // Hide edges where either endpoint is hidden
  cy.edges().forEach(e => {
    if (e.source().hasClass('filter-hidden') || e.target().hasClass('filter-hidden')) {
      e.addClass('filter-hidden');
    } else {
      e.removeClass('filter-hidden');
    }
  });
}

function filterByType(type) {
  currentTypeFilter = type;
  document.querySelectorAll('#header button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + type)?.classList.add('active');
  applyFilters();
  closePopup();
}

function filterByRead(mode) {
  if (currentReadFilter === mode) {
    currentReadFilter = 'all';
    document.getElementById('btn-unread')?.classList.remove('active');
    document.getElementById('btn-read-only')?.classList.remove('active');
  } else {
    currentReadFilter = mode;
    document.getElementById('btn-unread')?.classList.remove('active');
    document.getElementById('btn-read-only')?.classList.remove('active');
    if (mode === 'unread') document.getElementById('btn-unread')?.classList.add('active');
    if (mode === 'read') document.getElementById('btn-read-only')?.classList.add('active');
  }
  applyFilters();
  closePopup();
}

// ===================== SEARCH =====================
const searchBox = document.getElementById('search-box');
let searchTimeout;
searchBox.addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const q = searchBox.value.toLowerCase().trim();
    cy.nodes().removeClass('search-match');

    if (!q) {
      cy.elements().removeClass('dimmed highlighted');
      return;
    }

    cy.elements().addClass('dimmed');
    cy.nodes().forEach(n => {
      const nd = nodes.find(x => x.id === n.data('id'));
      const searchable = [
        nd?.label, nd?.title, nd?.detail?.thesis, nd?.detail?.philosophers,
        nd?.detail?.example, nd?.detail?.note
      ].filter(Boolean).join(' ').toLowerCase();

      if (searchable.includes(q)) {
        n.removeClass('dimmed').addClass('highlighted search-match');
        n.neighborhood().removeClass('dimmed');
      }
    });
  }, 200);
});

// Escape to close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePopup();
});
</script>
