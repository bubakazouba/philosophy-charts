<style>

  #popup .section-label { color: #8b949e; font-size: 11px; text-transform: uppercase;

  #popup ul { padding-left: 18px; font-size: 13px; line-height: 1.6; }
  #popup .note { color: #8b949e; font-size: 12px; font-style: italic; margin-top: 8px; }

<body>

<div id="header">
  <h1>Theories of Consciousness -- Interactive Dependency Graph</h1>
  <div class="controls">
    <input type="text" id="search-box" placeholder="Search nodes..." />
    <button onclick="filterByType('all')" class="active" id="btn-all">All</button>
    <button onclick="filterByType('theory')" id="btn-theory">Theories</button>
    <button onclick="filterByType('premise')" id="btn-premise">Premises</button>
    <button onclick="filterByType('objection')" id="btn-objection">Objections</button>

    <button onclick="filterByType('consequence')" id="btn-consequence">Consequences</button>
    <span style="color:#30363d;">|</span>
    <button onclick="filterByRead('unread')" id="btn-unread">Unread Only</button>
    <button onclick="filterByRead('read')" id="btn-read-only">Read Only</button>
    <button onclick="markAllRead()" id="btn-mark-all">Mark All Read</button>
    <button onclick="markAllUnread()" id="btn-mark-unread">Clear All</button>
    <button onclick="cy.fit(undefined, 40)">Reset View</button>
  </div>
</div>

<div id="progress-bar"><div id="progress-fill"></div></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6;"></div> Core Theory / Framework</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e;"></div> Premise / Support</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444;"></div> Objection / Attack</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a855f7;"></div> Response / Defense</div>
  <div class="legend-item"><div class="legend-dot" style="background:#eab308;"></div> Consequence / Implication</div>
  <div style="margin-top:6px;border-top:1px solid #30363d;padding-top:6px;">
    <div class="legend-item"><div class="legend-dot" style="background:#0d1117;border:2px solid #22c55e;display:flex;align-items:center;justify-content:center;font-size:8px;color:#22c55e;">&#10003;</div> Read (checkmark on node)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0d1117;border:2px dashed #484f58;"></div> Unread (default)</div>

<script>
// ===================== READ STATE (localStorage) =====================
const STORAGE_KEY = 'consciousness_graph_read_state';

function getReadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveReadState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function isRead(nodeId) {
  return !!getReadState()[nodeId];
}
function toggleRead(nodeId) {
  const state = getReadState();
  if (state[nodeId]) { delete state[nodeId]; } else { state[nodeId] = true; }
  saveReadState(state);
  updateNodeVisuals(nodeId);
  updateProgress();
  const btn = document.getElementById('read-toggle-btn');
  if (btn && btn.dataset.nodeId === nodeId) {
    updateReadButton(nodeId);
  }
}
function markAllRead() {
  const state = getReadState();
  nodes.forEach(n => { state[n.id] = true; });
  saveReadState(state);
  nodes.forEach(n => updateNodeVisuals(n.id));
  updateProgress();
}
function markAllUnread() {
  saveReadState({});
  nodes.forEach(n => updateNodeVisuals(n.id));
  updateProgress();
}

// ===================== NODE DATA =====================
const nodes = [
  // ===== THE HARD PROBLEM (central framing) =====
  {
    id: 'hard_problem', type: 'theory', section: 'The Hard Problem',
    label: 'The Hard Problem\nof Consciousness',
    title: 'Chalmers: The Hard Problem of Consciousness',
    detail: {
      philosophers: 'David Chalmers (1995, 1996)',
      thesis: 'Why and how do physical processes give rise to subjective experience (phenomenal consciousness / qualia)? The "easy problems" concern explaining cognitive functions (discrimination, reporting, attention). The "hard problem" asks why there is "something it is like" to have those processes.',
      premises: ['Functional/behavioral explanations address the "easy problems" but leave the subjective dimension unexplained', 'Even a complete functional account of the brain would leave open why it feels like something', 'The explanatory gap between objective processes and subjective experience is the core puzzle'],
      consequence: 'Every theory of consciousness must either solve, dissolve, or explain away the hard problem.'
    }
  },
  {
    id: 'zombie', type: 'premise', section: 'The Hard Problem',
    label: 'Zombie\nArgument',
    title: 'The Conceivability / Zombie Argument',
    detail: {
      philosophers: 'David Chalmers (1996)',
      thesis: 'A philosophical zombie -- a being physically and functionally identical to a conscious human but lacking subjective experience -- is conceivable. If conceivable, it is metaphysically possible. If possible, then consciousness is not entailed by physical facts alone.',
      premises: ['P1: We can coherently conceive of a zombie duplicate', 'P2: Conceivability entails metaphysical possibility (controversial)', 'P3: If zombies are possible, physicalism is false'],
      consequence: 'This is the most influential argument against physicalist theories of consciousness.'
    }
  },
  {
    id: 'obj_zombie', type: 'objection', section: 'The Hard Problem',
    label: 'Zombie\nInconceivability',
    title: 'Objection: Zombies Are Not Truly Conceivable',
    detail: {
      philosophers: 'Daniel Dennett (1995), Eric Marcus (2004)',
      thesis: 'We cannot actually coherently conceive of zombies. We only think we can because we have an impoverished understanding of what physical processes entail. Conceivability does not reliably track metaphysical possibility.',
      premises: ['The conceivability-possibility link is unreliable (e.g., Goldbach zombies)', 'We lack the cognitive resources to fully conceive what physical identity entails', 'Zombies may be "prima facie" but not "ideally" conceivable'],
    }
  },
  {
    id: 'explan_gap', type: 'premise', section: 'The Hard Problem',
    label: 'Explanatory\nGap',
    title: 'Levine: The Explanatory Gap',
    detail: {
      philosophers: 'Joseph Levine (1983)',
      thesis: 'Even if consciousness IS identical to brain states, we cannot explain WHY a particular brain state feels a particular way. There is an explanatory gap between physical descriptions and phenomenal qualities, even if there is no ontological gap.',
      premises: ['We can explain why water = H2O via its causal/functional role', 'We cannot similarly explain why C-fiber firing = pain', 'The identity may hold, but it remains brute and unexplained'],
      note: 'Levine is careful: the explanatory gap does not necessarily entail an ontological gap.'
    }
  },
  {
    id: 'know_arg', type: 'premise', section: 'The Hard Problem',
    label: 'Knowledge\nArgument\n(Mary\'s Room)',
    title: 'Jackson: The Knowledge Argument',
    detail: {
      philosophers: 'Frank Jackson (1982, 1986)',
      thesis: 'Mary, a brilliant neuroscientist confined to a black-and-white room, knows all physical facts about color vision. When she sees red for the first time, she learns something new: what it is LIKE to see red. Therefore, physical facts do not exhaust all facts.',
      premises: ['P1: Mary knows all physical facts about color', 'P2: Upon seeing red, she learns something new', 'P3: Therefore there are non-physical facts (qualia)'],
      note: 'Jackson himself later rejected this argument and became a physicalist.'
    }
  },
  {
    id: 'obj_know_ability', type: 'response', section: 'The Hard Problem',
    label: 'Ability\nHypothesis',
    title: 'Lewis/Nemirow: Mary Gains Abilities, Not Facts',
    detail: {
      philosophers: 'David Lewis (1988), Laurence Nemirow (1990)',
      thesis: 'When Mary sees red, she does not learn a new fact. She gains new abilities: the ability to recognize, imagine, and remember red. Knowledge-how is not knowledge-that.',
      premises: ['Knowing what red looks like = knowing how to recognize/imagine it', 'Abilities are not propositional knowledge', 'No new facts are learned, so physicalism is safe'],
    }
  },

  // ===== GLOBAL WORKSPACE THEORY =====
  {
    id: 'gwt', type: 'theory', section: 'Global Workspace',
    label: 'Global Workspace\nTheory (GWT)',
    title: 'Global Workspace Theory',
    detail: {
      philosophers: 'Bernard Baars (1988), Stanislas Dehaene & Jean-Pierre Changeux (2011)',
      thesis: 'Consciousness arises when information is broadcast globally across the brain via a "global workspace." Unconscious processing occurs in specialized, modular processors. When information wins a competition for access to the workspace, it becomes available to many brain systems simultaneously (working memory, planning, verbal report) -- and this global availability IS consciousness.',
      premises: ['The brain has many parallel, unconscious specialist processors', 'A "global workspace" (prefrontal-parietal network) integrates and broadcasts selected information', 'Information becomes conscious when it is globally broadcast and available to multiple subsystems'],
      example: 'In the attentional blink paradigm, stimuli that fail to enter the workspace remain unconscious despite being processed by early visual areas.'
    }
  },
  {
    id: 'gwt_neural', type: 'premise', section: 'Global Workspace',
    label: 'Neural Correlates:\nIgnition & P3b',
    title: 'Empirical Support: Neural Ignition',
    detail: {
      philosophers: 'Dehaene, Changeux, Naccache (2006)',
      thesis: 'When a stimulus becomes conscious, there is a sudden, nonlinear "ignition" of sustained activity in prefrontal and parietal cortex, accompanied by the P3b ERP component and increased long-range synchrony.',
      premises: ['Subliminal stimuli activate local processors but no global ignition', 'Conscious percepts show late (300ms+) widespread cortical activation', 'This all-or-none ignition pattern matches the workspace broadcasting prediction'],
    }
  },
  {
    id: 'obj_gwt_hard', type: 'objection', section: 'Global Workspace',
    label: 'GWT Doesn\'t\nSolve Hard Problem',
    title: 'Objection: GWT Only Addresses Access, Not Phenomenal Consciousness',
    detail: {
      philosophers: 'Ned Block (2007), Chalmers (2010)',
      thesis: 'GWT explains "access consciousness" (availability for report/reasoning) but not "phenomenal consciousness" (what it is like). Broadcasting explains function, not subjective feel.',
      premises: ['Access consciousness != phenomenal consciousness (Block\'s distinction)', 'A zombie brain could broadcast information globally without any subjective experience', 'GWT conflates the mechanisms of reportability with the essence of experience'],
      consequence: 'GWT may be a theory of access consciousness only, not a complete theory of consciousness.'
    }
  },
  {
    id: 'resp_gwt_deflationary', type: 'response', section: 'Global Workspace',
    label: 'Deflationary\nResponse to\nHard Problem',
    title: 'Response: The Hard Problem May Not Be a Separate Problem',
    detail: {
      philosophers: 'Dehaene (2014), Dennett (2005)',
      thesis: 'Once you fully explain all the functional and cognitive aspects of consciousness (reportability, integration, access), there is nothing left to explain. The "hard problem" is a residual illusion created by dualist intuitions.',
      premises: ['Every aspect of what we call "experience" can be functionally decomposed', 'The intuition that something is left over after functional explanation is itself a cognitive artifact', 'Explaining access IS explaining consciousness'],
    }
  },

  // ===== INTEGRATED INFORMATION THEORY =====
  {
    id: 'iit', type: 'theory', section: 'Integrated Information Theory',
    label: 'Integrated\nInformation\nTheory (IIT)',
    title: 'Integrated Information Theory',
    detail: {
      philosophers: 'Giulio Tononi (2004, 2008), Tononi & Koch (2015)',
      thesis: 'Consciousness is identical to integrated information (Phi). A system is conscious to the degree that it is both differentiated (many possible states) and integrated (the whole generates more information than its parts). Phi quantifies how much a system is "more than the sum of its parts."',
      premises: ['Axiom 1 (Intrinsic existence): Consciousness exists from the intrinsic perspective', 'Axiom 2 (Composition): Consciousness is structured', 'Axiom 3 (Information): Consciousness is specific/differentiated', 'Axiom 4 (Integration): Consciousness is unified', 'Axiom 5 (Exclusion): Consciousness is definite'],
      note: 'IIT starts from the phenomenology (axioms about experience) and derives physical requirements (postulates).'
    }
  },
  {
    id: 'iit_phi', type: 'premise', section: 'Integrated Information Theory',
    label: 'Phi (integrated\ninformation)\nmeasure',
    title: 'Phi: The Mathematical Measure of Consciousness',
    detail: {
      philosophers: 'Tononi (2004)',
      thesis: 'Phi measures the amount of integrated information generated by a system above and beyond its parts. High Phi = high consciousness. Phi = 0 means no consciousness.',
      premises: ['Partition the system into parts in the way that makes the least difference (minimum information partition)', 'Phi = the information lost when the system is "cut" at this partition', 'The cerebellum has low Phi (modular) despite many neurons; cortex has high Phi (integrated)'],
      note: 'Computing Phi exactly is intractable for large systems -- a major practical limitation.'
    }
  },
  {
    id: 'obj_iit_panpsychism', type: 'consequence', section: 'Integrated Information Theory',
    label: 'IIT Implies\nPanpsychism',
    title: 'Consequence: IIT Entails a Form of Panpsychism',
    detail: {
      philosophers: 'Tononi & Koch (2015), recognized by proponents',
      thesis: 'Since any system with Phi > 0 has some consciousness, even simple systems (thermostats, photodiodes) have a tiny degree of experience. IIT proponents embrace this as a feature, not a bug.',
      premises: ['A single photodiode has Phi > 0 (it integrates information, however minimally)', 'Therefore it has a minimal form of experience', 'Consciousness is a graded, fundamental property of physical systems'],
      consequence: 'Critics see this as a reductio ad absurdum; proponents see it as an elegant solution to the hard problem.'
    }
  },
  {
    id: 'obj_iit_unfalsifiable', type: 'objection', section: 'Integrated Information Theory',
    label: 'Phi Is\nUncomputable',
    title: 'Objection: Phi Is Computationally Intractable',
    detail: {
      philosophers: 'Tegmark (2016), Barrett & Seth (2011)',
      thesis: 'Computing Phi for real neural systems is computationally intractable (worse than NP-hard). This makes IIT effectively unfalsifiable for complex systems.',
      premises: ['Exact Phi computation scales super-exponentially with system size', 'Proxy measures exist but their relationship to true Phi is unclear', 'A theory that cannot be measured cannot be tested'],
    }
  },
  {
    id: 'obj_iit_structure', type: 'objection', section: 'Integrated Information Theory',
    label: 'Scott Aaronson:\nGrid Objection',
    title: 'Aaronson: Simple Grids Can Have Huge Phi',
    detail: {
      philosophers: 'Scott Aaronson (2014)',
      thesis: 'A simple 2D grid of logic gates, with no interesting computation, can be constructed to have arbitrarily high Phi. This means Phi does not track consciousness -- it tracks a mathematical property unrelated to cognition.',
      premises: ['Construct a planar network of XOR gates arranged in a grid', 'This has extremely high Phi by IIT\'s definition', 'Yet intuitively, such a grid is not "more conscious" than the human brain'],
      consequence: 'Phi may be measuring the wrong thing entirely.'
    }
  },
  {
    id: 'resp_iit_exclusion', type: 'response', section: 'Integrated Information Theory',
    label: 'IIT 3.0:\nExclusion\nPostulate',
    title: 'Response: The Exclusion Postulate Handles Some Cases',
    detail: {
      philosophers: 'Tononi (2012), Oizumi, Albantakis & Tononi (2014)',
      thesis: 'IIT 3.0+ refines Phi with the exclusion postulate: only the system with maximal Phi over the "right" spatiotemporal grain exists as a conscious entity. This rules out some pathological cases.',
      premises: ['Only the maximum of integrated information (MICS) counts', 'Overlapping systems: only the one with highest Phi is conscious', 'This prevents double-counting and handles some grid objections'],
      note: 'Critics argue this is ad hoc and the fundamental issue remains.'
    }
  },

  // ===== HIGHER-ORDER THEORIES =====
  {
    id: 'hot', type: 'theory', section: 'Higher-Order Theories',
    label: 'Higher-Order\nThought Theory\n(HOT)',
    title: 'Higher-Order Thought Theory',
    detail: {
      philosophers: 'David Rosenthal (1986, 2005)',
      thesis: 'A mental state is conscious when it is the object of a higher-order thought (HOT) -- i.e., when you have a thought ABOUT that mental state. Consciousness requires meta-representation: thinking about your own thinking.',
      premises: ['A mental state can exist without being conscious (unconscious perception)', 'What makes a state conscious is a higher-order representation of it', 'The HOT must be non-inferential and occur roughly simultaneously with the first-order state'],
      example: 'You see red (first-order state). You are conscious of seeing red because you have a thought "I am seeing red" (higher-order thought).'
    }
  },
  {
    id: 'hop', type: 'theory', section: 'Higher-Order Theories',
    label: 'Higher-Order\nPerception\n(HOP)',
    title: 'Higher-Order Perception Theory',
    detail: {
      philosophers: 'David Armstrong (1968), William Lycan (1996)',
      thesis: 'Consciousness arises from an inner perception or monitoring mechanism -- an "inner sense" that perceives one\'s own mental states, analogous to how outer senses perceive the world.',
      premises: ['There is an inner scanner/monitor that perceives first-order states', 'This inner perception is quasi-perceptual, not conceptual/thought-like', 'Conscious states are those being monitored by this inner sense'],
      note: 'Differs from HOT: the higher-order state is perceptual, not conceptual.'
    }
  },
  {
    id: 'obj_hot_misrep', type: 'objection', section: 'Higher-Order Theories',
    label: 'Misrepresentation\nProblem',
    title: 'The Targetless HOT / Misrepresentation Problem',
    detail: {
      philosophers: 'Ned Block (2011), Alex Byrne (1997)',
      thesis: 'If a HOT can misrepresent -- you have a thought "I see red" when there is no red experience -- then by HOT theory, you are conscious of seeing red when you aren\'t seeing red at all. This seems absurd.',
      premises: ['HOTs, like all representations, can misfire', 'A targetless HOT (no first-order state) should still produce consciousness on HOT theory', 'This means consciousness can be about nothing -- which seems wrong'],
      consequence: 'Either HOTs cannot misrepresent (implausible) or HOT theory has a serious structural flaw.'
    }
  },
  {
    id: 'resp_hot_misrep', type: 'response', section: 'Higher-Order Theories',
    label: 'Rosenthal:\nMisrepresentation\nis a Feature',
    title: 'Rosenthal: Targetless HOTs Are Genuinely Conscious States',
    detail: {
      philosophers: 'David Rosenthal (2005)',
      thesis: 'Yes, a targetless HOT does produce a genuine conscious experience -- and this is correct, not absurd. Think of phantom limb pain: there is a conscious experience of pain with no actual tissue damage. Consciousness tracks the representation, not reality.',
      premises: ['Phantom limb pain is real phenomenal experience', 'Charles Bonnet syndrome: visual hallucinations are conscious experiences without external stimuli', 'Consciousness is determined by the representing state, not by what is represented'],
    }
  },
  {
    id: 'obj_hot_regress', type: 'objection', section: 'Higher-Order Theories',
    label: 'Infinite\nRegress\nObjection',
    title: 'Objection: Infinite Regress of Higher Orders',
    detail: {
      philosophers: 'Classical objection, discussed by Rosenthal',
      thesis: 'If a state is conscious only if represented by a HOT, then is the HOT itself conscious? If so, it needs a third-order thought, and so on ad infinitum.',
      premises: ['State S1 needs HOT about S1 to be conscious', 'Is the HOT itself conscious? If so, need a HOT about the HOT', 'This generates an infinite regress'],
    }
  },
  {
    id: 'resp_hot_regress', type: 'response', section: 'Higher-Order Theories',
    label: 'HOTs Are\nTypically\nUnconscious',
    title: 'Response: The HOT Need Not Itself Be Conscious',
    detail: {
      philosophers: 'Rosenthal (2005)',
      thesis: 'The higher-order thought that makes a first-order state conscious is itself typically unconscious. It does not need to be conscious to do its work. The regress stops at level 2.',
      premises: ['A HOT makes its TARGET conscious, not itself', 'The HOT is only conscious if there is a yet-higher thought about it (rare)', 'No regress: unconscious HOTs are the typical case'],
    }
  },

  // ===== RECURRENT PROCESSING THEORY =====
  {
    id: 'rpt', type: 'theory', section: 'Recurrent Processing',
    label: 'Recurrent\nProcessing\nTheory',
    title: 'Recurrent Processing Theory',
    detail: {
      philosophers: 'Victor Lamme (2006, 2010)',
      thesis: 'Consciousness arises from recurrent (feedback) processing between brain areas, not from feedforward processing alone. When sensory signals are fed forward through the visual hierarchy, processing is unconscious. When signals recur back from higher to lower areas, phenomenal experience emerges.',
      premises: ['Feedforward processing = unconscious feature extraction', 'Local recurrent processing (within visual cortex) = phenomenal experience', 'Widespread recurrent processing (including frontal areas) = access consciousness and reportability'],
      example: 'In visual masking, a briefly flashed stimulus is processed feedforward but masking disrupts recurrence -- and the percept vanishes.'
    }
  },
  {
    id: 'rpt_evidence', type: 'premise', section: 'Recurrent Processing',
    label: 'TMS & Masking\nEvidence',
    title: 'Empirical Support: TMS and Visual Masking',
    detail: {
      philosophers: 'Lamme & Roelfsema (2000), Pascual-Leone & Walsh (2001)',
      thesis: 'TMS applied to V1 after ~100ms (disrupting recurrent signals from higher areas back to V1) eliminates conscious perception of a stimulus, even though feedforward processing had already occurred.',
      premises: ['TMS to V1 at 100ms post-stimulus abolishes awareness', 'Feedforward responses in V1 at 40-60ms are unaffected', 'This dissociates feedforward (unconscious) from recurrent (conscious) processing'],
    }
  },
  {
    id: 'obj_rpt_phenom', type: 'objection', section: 'Recurrent Processing',
    label: 'Why Recurrence\n= Experience?',

  { source: 'resp_ill', target: 'obj_ill_absurd', label: 'responds to' },

  { source: 'resp_gwt_deflationary', target: 'illusionism', label: 'sympathetic to' },

  { source: 'chinese_room', target: 'bio_nat', label: 'supports' },
  { source: 'obj_chinese_systems', target: 'chinese_room', label: 'objects to' },
  { source: 'bio_nat', target: 'functionalism', label: 'rejects' },

  // Panpsychism
  { source: 'obj_combination', target: 'panpsychism', label: 'objects to' },
  { source: 'resp_cosmopsychism', target: 'obj_combination', label: 'responds to' },

  // Orch-OR
  { source: 'obj_orch_decoherence', target: 'orch_or', label: 'objects to' },
  { source: 'resp_orch_quantum_bio', target: 'obj_orch_decoherence', label: 'responds to' },

  // Functionalism
  { source: 'obj_china_brain', target: 'functionalism', label: 'objects to' },
  { source: 'obj_qualia_absent', target: 'functionalism', label: 'objects to' },
  { source: 'functionalism', target: 'identity', label: 'succeeds' },
  { source: 'gwt', target: 'functionalism', label: 'builds on' },

  // Identity theory
  { source: 'obj_multiple_real', target: 'identity', label: 'objects to' },
  { source: 'obj_multiple_real', target: 'functionalism', label: 'motivates' },

  // Property dualism
  { source: 'zombie', target: 'prop_dualism', label: 'motivates' },
  { source: 'obj_epiphenom', target: 'prop_dualism', label: 'objects to' },

  // PCS
  { source: 'pcs', target: 'explan_gap', label: 'explains away' },
  { source: 'obj_pcs', target: 'pcs', label: 'objects to' },

  // Neurophenomenology
  { source: 'neurophenom', target: 'ncc', label: 'complements' },

  // NCC & AI
  { source: 'ncc', target: 'gwt', label: 'constrains' },
  { source: 'ncc', target: 'iit', label: 'constrains' },
  { source: 'ncc', target: 'rpt', label: 'constrains' },
  { source: 'ai_consciousness', target: 'functionalism', label: 'test case for' },
  { source: 'ai_consciousness', target: 'iit', label: 'test case for' },
  { source: 'ai_consciousness', target: 'bio_nat', label: 'test case for' },
];

// ===================== COLOR MAP =====================
const colorMap = {
  theory: '#3b82f6',
  premise: '#22c55e',
  objection: '#ef4444',
  response: '#a855f7',
  consequence: '#eab308',
};

// ===================== BUILD CYTOSCAPE =====================
const cyElements = [];

nodes.forEach(n => {
  cyElements.push({
    data: {
      id: n.id, label: n.label, type: n.type, section: n.section,
    },
    classes: n.type,
  });
});

edges.forEach((e, i) => {
  cyElements.push({
    data: {
      id: 'e' + i, source: e.source, target: e.target, label: e.label,
    },
  });
});

const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: cyElements,
  style: [
    {
      selector: 'node',
      style: {
        'label': 'data(label)',
        'text-valign': 'center', 'text-halign': 'center',
        'font-size': '10px', 'color': '#e6edf3',
        'text-wrap': 'wrap', 'text-max-width': '100px',
        'width': 90, 'height': 90,
        'border-width': 2, 'border-style': 'dashed', 'border-color': '#484f58',
        'background-opacity': 0.9,
        'text-outline-width': 2, 'text-outline-color': '#0d1117', 'text-outline-opacity': 0.8,
      },
    },
    ...Object.entries(colorMap).map(([type, color]) => ({
      selector: `node.${type}`,
      style: { 'background-color': color },
    })),
    {
      selector: 'node.read',
      style: {
        'border-style': 'solid', 'border-color': '#22c55e', 'border-width': 3,
      },
    },
    {
      selector: 'edge',
      style: {
        'width': 1.5, 'line-color': '#30363d',
        'target-arrow-color': '#30363d', 'target-arrow-shape': 'triangle',
        'curve-style': 'bezier', 'arrow-scale': 0.8,
        'label': 'data(label)', 'font-size': '8px', 'color': '#484f58',
        'text-rotation': 'autorotate', 'text-margin-y': -8,
        'text-outline-width': 2, 'text-outline-color': '#0d1117',
      },
    },
    {
      selector: 'node:selected',
      style: { 'border-color': '#fff', 'border-width': 3, 'border-style': 'solid' },
    },
    {
      selector: '.highlighted',
      style: { 'opacity': 1 },
    },
    {
      selector: '.faded',
      style: { 'opacity': 0.15 },
    },
  ],
  layout: {
    name: 'fcose',
    quality: 'proof',
    randomize: true,
    animate: false,
    nodeSeparation: 120,
    idealEdgeLength: 180,
    nodeRepulsion: 12000,
    gravity: 0.3,
    gravityRange: 2.0,
    padding: 60,
  },
  minZoom: 0.2, maxZoom: 3,
});

// ===================== INTERACTIONS =====================
let activeFilter = 'all';
let readFilter = null;

function filterByType(type) {
  activeFilter = type;
  document.querySelectorAll('#header button').forEach(b => {
    if (b.id && b.id.startsWith('btn-')) b.classList.remove('active');
  });
  const btnId = 'btn-' + type;
  const btn = document.getElementById(btnId);
  if (btn) btn.classList.add('active');
  applyFilters();
}

function filterByRead(mode) {
  if (readFilter === mode) { readFilter = null; }
  else { readFilter = mode; }
  document.getElementById('btn-unread').classList.toggle('active', readFilter === 'unread');
  document.getElementById('btn-read-only').classList.toggle('active', readFilter === 'read');
  applyFilters();
}

function applyFilters() {
  cy.batch(() => {
    cy.elements().removeClass('faded highlighted');
    const state = getReadState();
    cy.nodes().forEach(node => {
      const nodeType = node.data('type');
      const nodeId = node.data('id');
      let show = true;
      if (activeFilter !== 'all' && nodeType !== activeFilter) show = false;
      if (readFilter === 'unread' && state[nodeId]) show = false;
      if (readFilter === 'read' && !state[nodeId]) show = false;
      if (show) { node.addClass('highlighted'); }
      else { node.addClass('faded'); }
    });
    cy.edges().forEach(edge => {
      const src = edge.source(); const tgt = edge.target();
      if (src.hasClass('highlighted') && tgt.hasClass('highlighted')) {
        edge.addClass('highlighted');
      } else {
        edge.addClass('faded');
      }
    });
  });
}

// Node click
cy.on('tap', 'node', function(evt) {
  const node = evt.target;
  const nodeId = node.data('id');
  const nd = nodes.find(n => n.id === nodeId);
  if (!nd) return;
  showPopup(nd);
});

cy.on('tap', function(evt) {
  if (evt.target === cy) closePopup();
});

function showPopup(nd) {
  const d = nd.detail;
  let html = `<h2>${nd.title}</h2>`;
  html += `<div class="meta"><strong>Type:</strong> ${nd.type} &nbsp;|&nbsp; <strong>Section:</strong> ${nd.section}</div>`;
  if (d.philosophers) html += `<div class="meta"><strong>Key figures:</strong> ${d.philosophers}</div>`;
  if (d.thesis) html += `<div class="thesis">${d.thesis}</div>`;
  if (d.premises && d.premises.length) {
    html += `<div class="section-label">Key premises / points</div><ul>`;
    d.premises.forEach(p => html += `<li>${p}</li>`);
    html += `</ul>`;
  }
  if (d.example) html += `<div class="section-label">Example</div><div style="font-size:13px;color:#c9d1d9;">${d.example}</div>`;
  if (d.advantage) html += `<div class="section-label">Advantage</div><div style="font-size:13px;color:#22c55e;">${d.advantage}</div>`;
  if (d.limitation) html += `<div class="section-label">Limitation</div><div style="font-size:13px;color:#eab308;">${d.limitation}</div>`;
  if (d.consequence) html += `<div class="section-label">Consequence</div><div style="font-size:13px;color:#eab308;">${d.consequence}</div>`;
  if (d.thought_experiment) html += `<div class="section-label">Thought Experiment</div><div style="font-size:13px;color:#c9d1d9;">${d.thought_experiment}</div>`;
  if (d.dependency) html += `<div class="section-label">Dependency</div><div style="font-size:13px;color:#8b949e;">${d.dependency}</div>`;
  if (d.note) html += `<div class="note">${d.note}</div>`;
  html += `<button class="read-btn" id="read-toggle-btn" data-node-id="${nd.id}" onclick="toggleRead('${nd.id}')" style="background:#21262d;color:#c9d1d9;">Loading...</button>`;
  document.getElementById('popup-content').innerHTML = html;
  document.getElementById('popup').style.display = 'block';
  updateReadButton(nd.id);
}

function updateReadButton(nodeId) {
  const btn = document.getElementById('read-toggle-btn');
  if (!btn) return;
  if (isRead(nodeId)) {
    btn.textContent = 'Mark as Unread';
    btn.style.background = '#22c55e'; btn.style.color = '#000'; btn.style.borderColor = '#22c55e';
  } else {
    btn.textContent = 'Mark as Read';
    btn.style.background = '#21262d'; btn.style.color = '#c9d1d9'; btn.style.borderColor = '#30363d';
  }
}

function closePopup() {
  document.getElementById('popup').style.display = 'none';
}

function updateNodeVisuals(nodeId) {
  const node = cy.getElementById(nodeId);
  if (!node.length) return;
  if (isRead(nodeId)) { node.addClass('read'); }
  else { node.removeClass('read'); }
}

function updateProgress() {
  const state = getReadState();
  const total = nodes.length;
  const read = nodes.filter(n => state[n.id]).length;
  document.getElementById('progress-fill').style.width = (total ? (read / total * 100) : 0) + '%';
  document.getElementById('progress-text').textContent = `${read} / ${total} read`;
}

// Search
document.getElementById('search-box').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { cy.elements().removeClass('faded highlighted'); return; }
  cy.batch(() => {
    cy.elements().removeClass('faded highlighted');
    cy.nodes().forEach(node => {
      const nd = nodes.find(n => n.id === node.data('id'));
      const text = [nd?.label, nd?.title, nd?.detail?.thesis, nd?.detail?.philosophers].join(' ').toLowerCase();
      if (text.includes(q)) { node.addClass('highlighted'); }
      else { node.addClass('faded'); }
    });
    cy.edges().forEach(edge => {
      const src = edge.source(); const tgt = edge.target();
      if (src.hasClass('highlighted') || tgt.hasClass('highlighted')) {
        edge.addClass('highlighted');
      } else { edge.addClass('faded'); }
    });
  });
});

// Init read states
nodes.forEach(n => updateNodeVisuals(n.id));
updateProgress();

// Keyboard
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });
</script>
</body>
